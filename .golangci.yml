version: "2"

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - unused
    - nilerr
    - misspell

  settings:
    misspell:
      locale: UK

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
